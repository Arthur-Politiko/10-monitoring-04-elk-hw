input {
  # Filebeat (beats protocol)
  beats {
    port => 5044
    # Optional: add a tag to make it easy to identify this input
    tags => ["beats"]
  }

  # TCP input for receiving JSON messages (e.g. from custom clients or docker logging drivers)
  tcp {
    port => 5000
    codec => json_lines
    tags => ["tcp_json"]
  }
}

filter {
  # Add a tag when JSON parsing fails (optional)
  if "_jsonparsefailure" in [tags] {
    mutate {
      add_tag => ["_json_parse_failed"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS}"]
    user => "${ELASTICSEARCH_USER}"
    password => "${ELASTICSEARCH_PASSWORD}"
    ssl => true
    cacert => "/usr/share/logstash/config/certs/ca/ca.crt"
    index => "logs-%{+YYYY.MM.dd}"
  }

  stdout { codec => rubydebug }
}
