  # Warm Nodes
  es-warm01:
    depends_on:
      es-hot01:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es-warm01
    hostname: es-warm01
